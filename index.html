<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON SURGE</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #05060c; color: #fff; overflow: hidden;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    -webkit-user-select: none; -moz-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent; touch-action: none;
  }
  #game { display: block; width: 100vw; height: 100vh; background: #05060c; cursor: crosshair; }
  #hud { position: fixed; inset: 0; pointer-events: none; }
  .ui { position: absolute; text-shadow: 0 0 8px currentColor; }
  #topbar { top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 18px; align-items: center; font-size: 14px; }
  .chip { background: rgba(10,14,24,0.6); border: 1px solid rgba(255,255,255,0.12); padding: 6px 12px; border-radius: 4px; letter-spacing: 2px; }
  .chip b { color: #6ff; margin-right: 6px; letter-spacing: 1px; }
  #hpbar { position: absolute; left: 16px; top: 16px; width: 220px; height: 10px; background: rgba(255,80,110,0.18); border: 1px solid rgba(255,80,110,0.5); box-shadow: 0 0 10px rgba(255,80,110,0.4); border-radius: 2px; overflow: hidden; }
  #hpfill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff3068, #ff8f4a); transition: width 0.15s; }
  #hplabel { position: absolute; left: 16px; top: 30px; font-size: 11px; letter-spacing: 2px; color: #ff99a8; }
  #xpbar { position: absolute; left: 0; right: 0; bottom: 0; height: 6px; background: rgba(100,200,255,0.15); }
  #xpfill { height: 100%; width: 0%; background: linear-gradient(90deg, #3af0ff, #ba88ff); box-shadow: 0 0 10px #6ff; transition: width 0.1s; }
  #lvlchip { position: absolute; left: 16px; top: 52px; font-size: 12px; color: #9ef; letter-spacing: 2px; }

  #overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at center, rgba(10,14,24,0.65), rgba(5,6,12,0.95));
    pointer-events: auto;
  }
  .hidden { display: none !important; }
  .panel {
    background: rgba(12, 14, 26, 0.9); border: 1px solid rgba(120, 200, 255, 0.35);
    box-shadow: 0 0 40px rgba(100,200,255,0.25), inset 0 0 40px rgba(100,200,255,0.05);
    padding: 28px 36px; text-align: center; max-width: 540px; border-radius: 6px;
  }
  h1 { font-size: 48px; margin: 0 0 8px; letter-spacing: 8px;
       background: linear-gradient(90deg, #3af0ff, #ba88ff, #ff6aa1);
       -webkit-background-clip: text; background-clip: text; color: transparent;
       text-shadow: 0 0 30px rgba(100,200,255,0.6); }
  .sub { font-size: 12px; color: #9ef; letter-spacing: 4px; margin-bottom: 18px; opacity: 0.85; }
  .hint { font-size: 13px; color: #b9c8df; margin: 14px 0; line-height: 1.7; letter-spacing: 1px; }
  .keys { display: inline-block; padding: 2px 7px; border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; background: rgba(255,255,255,0.05); font-size: 11px; margin: 0 2px; }
  button {
    font-family: inherit; letter-spacing: 3px; font-size: 13px; padding: 10px 26px;
    background: linear-gradient(135deg, rgba(58,240,255,0.1), rgba(186,136,255,0.1));
    color: #ecf4ff; border: 1px solid #6ff; cursor: pointer;
    box-shadow: 0 0 14px rgba(100,200,255,0.35); border-radius: 3px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button:hover { box-shadow: 0 0 22px rgba(100,200,255,0.7); transform: translateY(-1px); }
  button:active { transform: translateY(1px); }

  #levelup .panel { min-width: 480px; }
  #levelup h2 { font-size: 18px; color: #6ff; letter-spacing: 6px; margin: 0 0 4px; }
  #levelup .sub { margin-bottom: 20px; }
  .picks { display: flex; gap: 14px; flex-direction: column; }
  .pick {
    text-align: left; padding: 14px 18px; border: 1px solid rgba(120,200,255,0.3);
    background: rgba(20,30,50,0.5); cursor: pointer; border-radius: 4px;
    transition: all 0.15s; display: flex; align-items: center; gap: 14px;
  }
  .pick:hover { background: rgba(40,60,100,0.7); border-color: #6ff; transform: translateX(4px); box-shadow: 0 0 16px rgba(100,200,255,0.3); }
  .picon { width: 40px; height: 40px; border-radius: 50%; flex: 0 0 40px;
           display: flex; align-items: center; justify-content: center;
           font-size: 20px; font-weight: bold; }
  .pmeta { flex: 1; }
  .pname { font-size: 14px; letter-spacing: 2px; color: #fff; }
  .pdesc { font-size: 11px; color: #9ab; letter-spacing: 1px; margin-top: 4px; line-height: 1.4; }
  .plvl { font-size: 10px; color: #6ff; letter-spacing: 2px; margin-top: 3px; }

  #weapons { position: absolute; right: 16px; top: 16px; display: flex; flex-direction: column; gap: 6px; }
  .wslot { background: rgba(10,14,24,0.6); border: 1px solid rgba(120,200,255,0.25); padding: 4px 10px; font-size: 11px; letter-spacing: 2px; color: #9ef; border-radius: 3px; min-width: 110px; }
  .wslot b { color: #fff; margin-right: 6px; }

  #gameover h1 { color: #ff4776; background: none; -webkit-text-fill-color: #ff4776; text-shadow: 0 0 30px #ff4776; }
  #toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; letter-spacing: 8px;
           color: #6ff; text-shadow: 0 0 20px #6ff; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  #toast.show { opacity: 1; }

  /* Mobile joystick */
  #joystick { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px;
              border: 2px solid rgba(120,200,255,0.3); border-radius: 50%;
              background: rgba(20,30,50,0.3); display: none; pointer-events: auto; }
  #stick { position: absolute; width: 50px; height: 50px; top: 35px; left: 35px;
           background: rgba(120,200,255,0.5); border-radius: 50%; box-shadow: 0 0 14px rgba(100,200,255,0.6); }
  @media (pointer: coarse) { #joystick { display: block; } }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div id="topbar" class="ui">
    <div class="chip"><b>TIME</b><span id="timer">00:00</span></div>
    <div class="chip"><b>KILLS</b><span id="kills">0</span></div>
    <div class="chip"><b>BEST</b><span id="best">00:00</span></div>
  </div>
  <div id="hpbar"><div id="hpfill"></div></div>
  <div id="hplabel">HULL 100 / 100</div>
  <div id="lvlchip">LV 1</div>
  <div id="weapons"></div>
  <div id="xpbar"><div id="xpfill"></div></div>
  <div id="toast"></div>
</div>

<div id="overlay">
  <div class="panel">
    <h1>NEON SURGE</h1>
    <div class="sub">HORDE SURVIVAL // BULLET HEAVEN</div>
    <div class="hint">
      Move: <span class="keys">W A S D</span> or <span class="keys">Arrows</span><br>
      Weapons fire automatically. Collect XP cores to level up.<br>
      Survive the surge. Pick upgrades wisely.<br>
      Mobile: drag joystick to move.
    </div>
    <button id="startBtn">START</button>
  </div>
</div>

<div id="levelup" class="hidden" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(10,14,24,0.75),rgba(5,6,12,0.95));pointer-events:auto;">
  <div class="panel">
    <h2>LEVEL UP</h2>
    <div class="sub">CHOOSE YOUR EDGE</div>
    <div class="picks" id="picks"></div>
  </div>
</div>

<div id="gameover" class="hidden" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(40,0,20,0.8),rgba(5,6,12,0.95));pointer-events:auto;">
  <div class="panel">
    <h1>SURGE ENDED</h1>
    <div class="sub" id="goStats"></div>
    <div class="hint" id="goVerdict"></div>
    <button id="retryBtn">AGAIN</button>
  </div>
</div>

<div id="joystick"><div id="stick"></div></div>

<script>
(function () {
  'use strict';

  // ---------- Canvas ----------
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- Utils ----------
  function rand(a, b) { return a + Math.random() * (b - a); }
  function randi(a, b) { return Math.floor(rand(a, b)); }
  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
  function dist2(ax, ay, bx, by) { var dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; }
  function angle(ax, ay, bx, by) { return Math.atan2(by - ay, bx - ax); }

  // ---------- Audio ----------
  var AC = null, master = null;
  function initAudio() {
    if (AC) return;
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain();
      master.gain.value = 0.35;
      master.connect(AC.destination);
    } catch (e) { AC = null; }
  }
  function beep(freq, dur, type, vol, slide) {
    if (!AC) return;
    var o = AC.createOscillator(), g = AC.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq * slide), AC.currentTime + dur);
    g.gain.value = 0.0001;
    g.gain.exponentialRampToValueAtTime(vol || 0.15, AC.currentTime + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
    o.connect(g); g.connect(master);
    o.start(); o.stop(AC.currentTime + dur + 0.02);
  }
  function sfxShoot() { beep(880, 0.05, 'square', 0.06, 0.5); }
  function sfxHit()   { beep(180, 0.08, 'square', 0.12, 0.4); }
  function sfxPop()   { beep(520, 0.07, 'triangle', 0.1, 0.5); }
  function sfxXp()    { beep(1400, 0.04, 'sine', 0.08, 1.5); }
  function sfxLvl()   { beep(660, 0.2, 'triangle', 0.2, 2); setTimeout(function(){beep(990, 0.25, 'triangle', 0.18, 2);}, 80); }
  function sfxHurt()  { beep(120, 0.2, 'sawtooth', 0.18, 0.5); }
  function sfxDead()  { beep(220, 0.6, 'sawtooth', 0.25, 0.2); setTimeout(function(){beep(110, 0.8, 'sawtooth', 0.22, 0.2);}, 200); }
  function sfxBoom()  { beep(90, 0.4, 'sawtooth', 0.25, 0.3); }
  function sfxBlip()  { beep(1200, 0.03, 'sine', 0.06); }

  // ---------- Input ----------
  var keys = {};
  window.addEventListener('keydown', function (e) {
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ' || e.key.startsWith('Arrow')) e.preventDefault();
  });
  window.addEventListener('keyup',   function (e) { keys[e.key.toLowerCase()] = false; });

  var joyActive = false, joyVec = { x: 0, y: 0 };
  var joy = document.getElementById('joystick'), stick = document.getElementById('stick');
  function joyStart(e) {
    joyActive = true; e.preventDefault();
    var t = e.touches ? e.touches[0] : e;
    joy.style.left = (t.clientX - 60) + 'px';
    joy.style.top  = (t.clientY - 60) + 'px';
    joy.style.display = 'block';
  }
  function joyMove(e) {
    if (!joyActive) return;
    var t = e.touches ? e.touches[0] : e;
    var r = joy.getBoundingClientRect();
    var cx = r.left + 60, cy = r.top + 60;
    var dx = t.clientX - cx, dy = t.clientY - cy;
    var d = Math.sqrt(dx * dx + dy * dy), max = 50;
    if (d > max) { dx = dx / d * max; dy = dy / d * max; }
    stick.style.left = (35 + dx) + 'px';
    stick.style.top  = (35 + dy) + 'px';
    joyVec.x = dx / max; joyVec.y = dy / max;
  }
  function joyEnd() {
    joyActive = false; joyVec.x = 0; joyVec.y = 0;
    stick.style.left = '35px'; stick.style.top = '35px';
  }
  window.addEventListener('touchstart', joyStart, { passive: false });
  window.addEventListener('touchmove',  joyMove,  { passive: false });
  window.addEventListener('touchend',   joyEnd);

  // ---------- Game state ----------
  var game;
  function newGame() {
    game = {
      t: 0,
      dt: 0,
      running: false,
      paused: false,
      player: {
        x: W / 2, y: H / 2, vx: 0, vy: 0,
        r: 12, speed: 220, hp: 100, maxHp: 100, inv: 0,
        xp: 0, xpNext: 5, level: 1,
        pickupRadius: 90, speedMul: 1, dmgMul: 1, cdMul: 1, areaMul: 1, regen: 0
      },
      enemies: [],
      bullets: [],
      orbs: [],
      pickups: [],
      particles: [],
      weapons: [ makeWeapon('pulse') ],
      shake: 0,
      flash: 0,
      kills: 0,
      spawnTimer: 0,
      bossTimer: 0,
      nextBossAt: 90,
      difficulty: 1,
      damageNumbers: []
    };
  }

  // ---------- Weapons ----------
  var WEAPON_DEFS = {
    pulse: {
      name: 'PULSE', color: '#6ff', icon: '•',
      desc: 'Homing neon shots. Finds the nearest threat.',
      baseCd: 0.55, baseDmg: 10, baseSpeed: 520, baseSize: 5,
      maxLevel: 6,
      onFire: function (w, p, g) {
        var target = findNearestEnemy(g, p.x, p.y, 700);
        if (!target) return;
        var a = angle(p.x, p.y, target.x, target.y);
        var shots = 1 + Math.floor((w.level - 1) / 2);
        var spread = shots > 1 ? 0.25 : 0;
        for (var i = 0; i < shots; i++) {
          var off = shots === 1 ? 0 : (i - (shots - 1) / 2) * spread;
          g.bullets.push({
            x: p.x, y: p.y,
            vx: Math.cos(a + off) * w.stat('speed'),
            vy: Math.sin(a + off) * w.stat('speed'),
            r: w.stat('size'), dmg: w.stat('dmg'), life: 1.2,
            color: '#6ff', homing: 0.04, pierce: 0, trail: []
          });
        }
        sfxShoot();
      }
    },
    orbit: {
      name: 'ORBIT', color: '#ba88ff', icon: '◎',
      desc: 'Energy orbs circle you, shredding contact.',
      baseCd: 4, baseDmg: 6, baseSpeed: 0, baseSize: 10,
      maxLevel: 6,
      onFire: function (w, p, g) {
        var count = 2 + Math.floor((w.level - 1));
        for (var i = 0; i < count; i++) {
          g.bullets.push({
            orbit: true, ownerAngle: (i / count) * Math.PI * 2,
            radius: 55 + w.level * 6, spin: 3.0,
            r: w.stat('size'), dmg: w.stat('dmg'), life: 3 + w.level * 0.3,
            color: '#ba88ff', pierce: 99, hitCd: {}, trail: []
          });
        }
        sfxPop();
      }
    },
    wave: {
      name: 'WAVE', color: '#ff6aa1', icon: '◯',
      desc: 'Expanding shockwave. AoE clear.',
      baseCd: 3.2, baseDmg: 18, baseSpeed: 320, baseSize: 12,
      maxLevel: 6,
      onFire: function (w, p, g) {
        g.bullets.push({
          wave: true, x: p.x, y: p.y, r: 20, maxR: 160 + w.level * 30,
          growRate: w.stat('speed'), dmg: w.stat('dmg'), life: 0.9,
          color: '#ff6aa1', pierce: 99, hitCd: {}
        });
        sfxBoom();
      }
    },
    chain: {
      name: 'CHAIN', color: '#f7ff5a', icon: '⟿',
      desc: 'Arcing lightning jumps between enemies.',
      baseCd: 1.8, baseDmg: 14, baseSpeed: 0, baseSize: 0,
      maxLevel: 5,
      onFire: function (w, p, g) {
        var t = findNearestEnemy(g, p.x, p.y, 360);
        if (!t) return;
        var chainLen = 2 + w.level;
        var prev = { x: p.x, y: p.y };
        var hit = [];
        for (var i = 0; i < chainLen; i++) {
          if (!t || hit.indexOf(t) !== -1) break;
          hit.push(t);
          g.bullets.push({
            beam: true, x1: prev.x, y1: prev.y, x2: t.x, y2: t.y,
            dmg: w.stat('dmg'), life: 0.2, color: '#f7ff5a', target: t
          });
          damageEnemy(t, w.stat('dmg'), g, p);
          prev = { x: t.x, y: t.y };
          t = findNearestEnemyExcept(g, prev.x, prev.y, 220, hit);
        }
        sfxHit();
      }
    },
    spear: {
      name: 'LANCE', color: '#ff9a3c', icon: '➤',
      desc: 'Piercing lance forward. Skewers a line of enemies.',
      baseCd: 0.9, baseDmg: 18, baseSpeed: 620, baseSize: 6,
      maxLevel: 6,
      onFire: function (w, p, g) {
        var target = findNearestEnemy(g, p.x, p.y, 1000);
        var a = target ? angle(p.x, p.y, target.x, target.y) : rand(0, Math.PI * 2);
        var shots = 1 + Math.floor((w.level) / 2);
        for (var i = 0; i < shots; i++) {
          var off = (i - (shots - 1) / 2) * 0.18;
          g.bullets.push({
            x: p.x, y: p.y,
            vx: Math.cos(a + off) * w.stat('speed'),
            vy: Math.sin(a + off) * w.stat('speed'),
            r: w.stat('size'), dmg: w.stat('dmg'), life: 1.4,
            color: '#ff9a3c', pierce: 3 + w.level, trail: [], hitCd: {}
          });
        }
        sfxShoot();
      }
    }
  };

  function makeWeapon(key) {
    var def = WEAPON_DEFS[key];
    return {
      key: key, def: def, level: 1, cd: def.baseCd * 0.5,
      stat: function (s) {
        var base = def['base' + s.charAt(0).toUpperCase() + s.slice(1)];
        if (s === 'dmg') return Math.round(base * (1 + (this.level - 1) * 0.28) * game.player.dmgMul);
        if (s === 'size') return base * (1 + (this.level - 1) * 0.10) * game.player.areaMul;
        if (s === 'speed') return base;
        return base;
      },
      getCd: function () { return def.baseCd * Math.pow(0.93, this.level - 1) * game.player.cdMul; }
    };
  }

  function findNearestEnemy(g, x, y, maxD) {
    var best = null, bd = maxD * maxD;
    for (var i = 0; i < g.enemies.length; i++) {
      var e = g.enemies[i];
      var d = dist2(x, y, e.x, e.y);
      if (d < bd) { bd = d; best = e; }
    }
    return best;
  }
  function findNearestEnemyExcept(g, x, y, maxD, exclude) {
    var best = null, bd = maxD * maxD;
    for (var i = 0; i < g.enemies.length; i++) {
      var e = g.enemies[i];
      if (exclude.indexOf(e) !== -1) continue;
      var d = dist2(x, y, e.x, e.y);
      if (d < bd) { bd = d; best = e; }
    }
    return best;
  }

  // ---------- Enemies ----------
  var ENEMY_DEFS = {
    grunt:  { hp: 16, speed: 70,  r: 11, color: '#ff5577', xp: 1, dmg: 8,  shape: 'tri' },
    runner: { hp: 10, speed: 140, r: 9,  color: '#ff8ad4', xp: 1, dmg: 6,  shape: 'diamond' },
    tank:   { hp: 80, speed: 45,  r: 18, color: '#c23a5b', xp: 3, dmg: 16, shape: 'hex' },
    swarm:  { hp: 5,  speed: 110, r: 6,  color: '#ff9c9c', xp: 0, dmg: 4,  shape: 'dot' },
    boss:   { hp: 600, speed: 55, r: 34, color: '#ff3060', xp: 20, dmg: 30, shape: 'boss' }
  };
  function spawnEnemy(kind, x, y) {
    var d = ENEMY_DEFS[kind];
    var e = {
      kind: kind, x: x, y: y, vx: 0, vy: 0,
      r: d.r, hp: d.hp * game.difficulty, maxHp: d.hp * game.difficulty,
      speed: d.speed, color: d.color, xp: d.xp, dmg: d.dmg,
      shape: d.shape, hitFlash: 0, a: rand(0, Math.PI * 2), spin: rand(-2, 2)
    };
    if (kind === 'boss') { e.hp = 600 + game.difficulty * 120; e.maxHp = e.hp; e.r = d.r; }
    game.enemies.push(e);
  }
  function spawnWave() {
    var margin = 60;
    var side = randi(0, 4);
    var x, y;
    if (side === 0)      { x = -margin;     y = rand(0, H); }
    else if (side === 1) { x = W + margin;  y = rand(0, H); }
    else if (side === 2) { x = rand(0, W);  y = -margin; }
    else                 { x = rand(0, W);  y = H + margin; }

    var t = game.t;
    var kinds = ['grunt'];
    if (t > 20) kinds.push('runner');
    if (t > 45) kinds.push('runner', 'grunt');
    if (t > 60) kinds.push('tank');
    if (t > 90) kinds.push('tank', 'runner');
    if (t > 150) kinds.push('tank', 'tank');

    var cluster = 1;
    if (t > 30) cluster = randi(1, 3);
    if (t > 75) cluster = randi(2, 5);
    if (t > 150) cluster = randi(3, 7);

    // swarm bursts occasionally
    if (t > 40 && Math.random() < 0.22) {
      for (var s = 0; s < 5 + randi(0, 6); s++) {
        spawnEnemy('swarm', x + rand(-40, 40), y + rand(-40, 40));
      }
      return;
    }

    var kind = kinds[randi(0, kinds.length)];
    for (var i = 0; i < cluster; i++) {
      spawnEnemy(kind, x + rand(-30, 30), y + rand(-30, 30));
    }
  }

  // ---------- Damage ----------
  function damageEnemy(e, dmg, g, p) {
    e.hp -= dmg;
    e.hitFlash = 0.12;
    g.damageNumbers.push({ x: e.x + rand(-6, 6), y: e.y - e.r - 4, t: 0, dmg: Math.round(dmg), color: '#fff' });
    if (e.hp <= 0) {
      killEnemy(e, g);
    }
  }
  function killEnemy(e, g) {
    g.kills++;
    sfxPop();
    explode(e.x, e.y, e.color, e.kind === 'boss' ? 60 : 14);
    if (e.kind === 'boss') { g.shake = 20; sfxBoom(); }
    for (var i = 0; i < Math.max(1, e.xp); i++) {
      g.orbs.push({ x: e.x + rand(-8, 8), y: e.y + rand(-8, 8), vx: rand(-40, 40), vy: rand(-40, 40), r: 4, life: 30 });
    }
    if (e.kind !== 'swarm' && Math.random() < 0.02) {
      g.pickups.push({ kind: 'heart', x: e.x, y: e.y, r: 8, life: 15 });
    }
    if (Math.random() < 0.006) {
      g.pickups.push({ kind: 'bomb', x: e.x, y: e.y, r: 10, life: 20 });
    }
    var idx = g.enemies.indexOf(e);
    if (idx !== -1) g.enemies.splice(idx, 1);
  }

  function explode(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      var a = rand(0, Math.PI * 2), sp = rand(40, 220);
      game.particles.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: rand(0.35, 0.7), max: 0.7, color: color, r: rand(1.2, 3) });
    }
  }

  // ---------- Update ----------
  function update(dt) {
    if (!game.running) return;
    game.t += dt;
    game.difficulty = 1 + game.t / 60;

    // Player input
    var p = game.player;
    var ax = 0, ay = 0;
    if (keys['w'] || keys['arrowup'])    ay -= 1;
    if (keys['s'] || keys['arrowdown'])  ay += 1;
    if (keys['a'] || keys['arrowleft'])  ax -= 1;
    if (keys['d'] || keys['arrowright']) ax += 1;
    if (joyVec.x || joyVec.y) { ax = joyVec.x; ay = joyVec.y; }
    var m = Math.sqrt(ax * ax + ay * ay);
    if (m > 1) { ax /= m; ay /= m; }
    var sp = p.speed * p.speedMul;
    p.vx = ax * sp;
    p.vy = ay * sp;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.x = clamp(p.x, p.r, W - p.r);
    p.y = clamp(p.y, p.r, H - p.r);
    if (p.inv > 0) p.inv -= dt;
    if (p.regen > 0) p.hp = Math.min(p.maxHp, p.hp + p.regen * dt);

    // Weapons
    for (var i = 0; i < game.weapons.length; i++) {
      var w = game.weapons[i];
      w.cd -= dt;
      if (w.cd <= 0) { w.cd = w.getCd(); w.def.onFire(w, p, game); }
    }

    // Enemy spawning
    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0) {
      var baseInterval = Math.max(0.18, 1.1 - game.t * 0.006);
      game.spawnTimer = baseInterval;
      spawnWave();
    }

    // Boss
    game.bossTimer += dt;
    if (game.t >= game.nextBossAt) {
      toast('BOSS INCOMING');
      spawnEnemy('boss', W / 2 + rand(-100, 100), -60);
      game.nextBossAt += 90;
      game.shake = 10;
    }

    // Enemies
    for (var j = game.enemies.length - 1; j >= 0; j--) {
      var e = game.enemies[j];
      var a = angle(e.x, e.y, p.x, p.y);
      e.vx = Math.cos(a) * e.speed;
      e.vy = Math.sin(a) * e.speed;
      // Separation — prevent perfect stacking
      for (var k = 0; k < game.enemies.length; k++) {
        if (k === j) continue;
        var o = game.enemies[k];
        var d2 = dist2(e.x, e.y, o.x, o.y);
        var rr = (e.r + o.r) * (e.r + o.r);
        if (d2 < rr && d2 > 0.01) {
          var d = Math.sqrt(d2);
          var push = (Math.sqrt(rr) - d) * 0.5;
          var nx = (e.x - o.x) / d, ny = (e.y - o.y) / d;
          e.vx += nx * push * 8;
          e.vy += ny * push * 8;
        }
      }
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.a += e.spin * dt;
      if (e.hitFlash > 0) e.hitFlash -= dt;

      // Collision with player
      var pr = (p.r + e.r) * 0.85;
      if (dist2(p.x, p.y, e.x, e.y) < pr * pr && p.inv <= 0) {
        p.hp -= e.dmg;
        p.inv = 0.7;
        game.shake = Math.max(game.shake, 10);
        game.flash = 0.2;
        sfxHurt();
        // knockback
        var ka = angle(e.x, e.y, p.x, p.y);
        p.x += Math.cos(ka) * 20;
        p.y += Math.sin(ka) * 20;
        if (p.hp <= 0) { gameOver(); return; }
      }
    }

    // Bullets
    for (var b = game.bullets.length - 1; b >= 0; b--) {
      var bu = game.bullets[b];
      bu.life -= dt;
      if (bu.life <= 0) { game.bullets.splice(b, 1); continue; }

      if (bu.orbit) {
        bu.ownerAngle += bu.spin * dt;
        bu.x = p.x + Math.cos(bu.ownerAngle) * bu.radius;
        bu.y = p.y + Math.sin(bu.ownerAngle) * bu.radius;
        // Multi-hit w/ cd per enemy
        for (var e2 = 0; e2 < game.enemies.length; e2++) {
          var en = game.enemies[e2];
          var eid = en.kind + '_' + en.x.toFixed(0) + '_' + en.y.toFixed(0);
          eid = en.__id || (en.__id = Math.random());
          if (bu.hitCd[eid] > 0) { bu.hitCd[eid] -= dt; continue; }
          var rr2 = (bu.r + en.r) * (bu.r + en.r);
          if (dist2(bu.x, bu.y, en.x, en.y) < rr2) {
            damageEnemy(en, bu.dmg, game, p);
            bu.hitCd[eid] = 0.3;
          }
        }
      } else if (bu.wave) {
        bu.r += bu.growRate * dt;
        if (bu.r > bu.maxR) { game.bullets.splice(b, 1); continue; }
        for (var we = game.enemies.length - 1; we >= 0; we--) {
          var en2 = game.enemies[we];
          var eid2 = en2.__id || (en2.__id = Math.random());
          if (bu.hitCd[eid2]) continue;
          var d2w = dist2(bu.x, bu.y, en2.x, en2.y);
          if (d2w < bu.r * bu.r && d2w > (bu.r - 30) * (bu.r - 30)) {
            damageEnemy(en2, bu.dmg, game, p);
            bu.hitCd[eid2] = true;
          }
        }
      } else if (bu.beam) {
        // draw only, already did damage
      } else {
        // Projectile
        if (bu.homing) {
          var tgt = findNearestEnemy(game, bu.x, bu.y, 400);
          if (tgt) {
            var ta = angle(bu.x, bu.y, tgt.x, tgt.y);
            var sp2 = Math.sqrt(bu.vx * bu.vx + bu.vy * bu.vy);
            var ca = Math.atan2(bu.vy, bu.vx);
            var da = ta - ca;
            while (da > Math.PI) da -= Math.PI * 2;
            while (da < -Math.PI) da += Math.PI * 2;
            ca += clamp(da, -bu.homing * Math.PI * 2 * dt * 60, bu.homing * Math.PI * 2 * dt * 60);
            bu.vx = Math.cos(ca) * sp2;
            bu.vy = Math.sin(ca) * sp2;
          }
        }
        bu.x += bu.vx * dt;
        bu.y += bu.vy * dt;
        bu.trail.push({ x: bu.x, y: bu.y });
        if (bu.trail.length > 6) bu.trail.shift();

        if (bu.x < -20 || bu.x > W + 20 || bu.y < -20 || bu.y > H + 20) {
          game.bullets.splice(b, 1); continue;
        }

        var hit = false;
        for (var ee = game.enemies.length - 1; ee >= 0; ee--) {
          var en3 = game.enemies[ee];
          var eid3 = en3.__id || (en3.__id = Math.random());
          if (bu.hitCd && bu.hitCd[eid3]) continue;
          var rr3 = (bu.r + en3.r) * (bu.r + en3.r);
          if (dist2(bu.x, bu.y, en3.x, en3.y) < rr3) {
            damageEnemy(en3, bu.dmg, game, p);
            if (bu.pierce > 0) {
              bu.pierce--;
              if (!bu.hitCd) bu.hitCd = {};
              bu.hitCd[eid3] = true;
            } else {
              hit = true;
            }
            break;
          }
        }
        if (hit) { game.bullets.splice(b, 1); }
      }
    }

    // XP orbs
    for (var o = game.orbs.length - 1; o >= 0; o--) {
      var or = game.orbs[o];
      or.life -= dt;
      var dp = dist2(or.x, or.y, p.x, p.y);
      if (dp < p.pickupRadius * p.pickupRadius) {
        var pa = angle(or.x, or.y, p.x, p.y);
        var pull = 400 + Math.max(0, p.pickupRadius - Math.sqrt(dp)) * 6;
        or.vx += Math.cos(pa) * pull * dt;
        or.vy += Math.sin(pa) * pull * dt;
      }
      or.x += or.vx * dt; or.y += or.vy * dt;
      or.vx *= 0.94; or.vy *= 0.94;
      if (dp < (p.r + or.r) * (p.r + or.r)) {
        p.xp++;
        sfxXp();
        game.orbs.splice(o, 1);
        if (p.xp >= p.xpNext) { levelUp(); }
      } else if (or.life <= 0) {
        game.orbs.splice(o, 1);
      }
    }

    // Pickups
    for (var pk = game.pickups.length - 1; pk >= 0; pk--) {
      var pkp = game.pickups[pk];
      pkp.life -= dt;
      if (dist2(pkp.x, pkp.y, p.x, p.y) < (p.r + pkp.r) * (p.r + pkp.r)) {
        if (pkp.kind === 'heart') {
          p.hp = Math.min(p.maxHp, p.hp + 25);
          toast('+25 HULL');
          sfxLvl();
        } else if (pkp.kind === 'bomb') {
          for (var bi = 0; bi < game.enemies.length; bi++) {
            var be = game.enemies[bi];
            if (be.kind !== 'boss') damageEnemy(be, 9999, game, p);
          }
          sfxBoom();
          game.shake = 24;
          game.flash = 0.4;
          toast('NOVA');
          explode(p.x, p.y, '#fff', 80);
          i = -1; // enemies array was mutated
        }
        game.pickups.splice(pk, 1);
      } else if (pkp.life <= 0) {
        game.pickups.splice(pk, 1);
      }
    }

    // Particles
    for (var pt = game.particles.length - 1; pt >= 0; pt--) {
      var par = game.particles[pt];
      par.life -= dt;
      if (par.life <= 0) { game.particles.splice(pt, 1); continue; }
      par.x += par.vx * dt;
      par.y += par.vy * dt;
      par.vx *= 0.93; par.vy *= 0.93;
    }

    // Damage numbers
    for (var dn = game.damageNumbers.length - 1; dn >= 0; dn--) {
      var d = game.damageNumbers[dn];
      d.t += dt;
      d.y -= 30 * dt;
      if (d.t > 0.6) game.damageNumbers.splice(dn, 1);
    }

    if (game.shake > 0) game.shake = Math.max(0, game.shake - dt * 40);
    if (game.flash > 0) game.flash = Math.max(0, game.flash - dt);

    updateHud();
  }

  // ---------- Level up ----------
  var levelupOpen = false;
  function levelUp() {
    var p = game.player;
    p.xp -= p.xpNext;
    p.level++;
    p.xpNext = Math.round(p.xpNext * 1.35 + 1);
    sfxLvl();
    showLevelup();
  }
  function showLevelup() {
    levelupOpen = true;
    game.running = false;
    var picks = pickUpgrades();
    var container = document.getElementById('picks');
    container.innerHTML = '';
    picks.forEach(function (u) {
      var div = document.createElement('div');
      div.className = 'pick';
      div.innerHTML = '<div class="picon" style="background:' + u.color + '22;border:1px solid ' + u.color + ';color:' + u.color + ';text-shadow:0 0 8px ' + u.color + '">' + u.icon + '</div>' +
                      '<div class="pmeta"><div class="pname">' + u.name + '</div><div class="pdesc">' + u.desc + '</div><div class="plvl">' + u.tag + '</div></div>';
      div.onclick = function () {
        u.apply();
        document.getElementById('levelup').classList.add('hidden');
        levelupOpen = false;
        game.running = true;
      };
      container.appendChild(div);
    });
    document.getElementById('levelup').classList.remove('hidden');
  }

  var PASSIVE_DEFS = [
    { name: 'SPEED',    desc: '+15% movement speed.',          color: '#7ef', icon: '»', apply: function () { game.player.speedMul *= 1.15; } },
    { name: 'VIGOR',    desc: '+25 max hull, heal to full.',    color: '#ff7a9e', icon: '♥', apply: function () { game.player.maxHp += 25; game.player.hp = game.player.maxHp; } },
    { name: 'POWER',    desc: '+15% damage to all weapons.',    color: '#ffb14a', icon: '★', apply: function () { game.player.dmgMul *= 1.15; } },
    { name: 'TEMPO',    desc: '-10% weapon cooldown.',          color: '#b88aff', icon: 'Ƨ', apply: function () { game.player.cdMul *= 0.9; } },
    { name: 'REACH',    desc: '+20% area and pickup range.',    color: '#9fffa3', icon: '◉', apply: function () { game.player.areaMul *= 1.2; game.player.pickupRadius *= 1.2; } },
    { name: 'REGEN',    desc: '+1 hull regen / sec.',           color: '#ffd86a', icon: '+', apply: function () { game.player.regen += 1; } }
  ];

  function pickUpgrades() {
    var out = [];
    // Offer weapon upgrades / new weapons
    var weaponOptions = [];
    for (var key in WEAPON_DEFS) {
      var existing = null;
      for (var i = 0; i < game.weapons.length; i++) { if (game.weapons[i].key === key) { existing = game.weapons[i]; break; } }
      if (existing) {
        if (existing.level < WEAPON_DEFS[key].maxLevel) {
          weaponOptions.push({
            name: WEAPON_DEFS[key].name + ' +', color: WEAPON_DEFS[key].color, icon: WEAPON_DEFS[key].icon,
            desc: WEAPON_DEFS[key].desc, tag: 'LV ' + existing.level + ' → ' + (existing.level + 1),
            apply: function (w) { return function () { w.level++; }; }(existing)
          });
        }
      } else if (game.weapons.length < 4) {
        weaponOptions.push({
          name: WEAPON_DEFS[key].name, color: WEAPON_DEFS[key].color, icon: WEAPON_DEFS[key].icon,
          desc: WEAPON_DEFS[key].desc, tag: 'NEW WEAPON',
          apply: function (k) { return function () { game.weapons.push(makeWeapon(k)); }; }(key)
        });
      }
    }
    var passiveOptions = PASSIVE_DEFS.map(function (pd) {
      return { name: pd.name, color: pd.color, icon: pd.icon, desc: pd.desc, tag: 'PASSIVE', apply: pd.apply };
    });

    var pool = weaponOptions.concat(passiveOptions);
    // Pick 3 unique random
    while (out.length < 3 && pool.length > 0) {
      var idx = randi(0, pool.length);
      out.push(pool[idx]);
      pool.splice(idx, 1);
    }
    if (out.length === 0) {
      out.push({ name: 'RECOVER', color: '#ff7a9e', icon: '♥', desc: '+50 hull.', tag: 'BONUS',
                 apply: function () { game.player.hp = Math.min(game.player.maxHp, game.player.hp + 50); } });
    }
    return out;
  }

  // ---------- Render ----------
  function render() {
    // Background
    ctx.fillStyle = '#05060c';
    ctx.fillRect(0, 0, W, H);

    // Subtle grid
    ctx.strokeStyle = 'rgba(100,200,255,0.05)';
    ctx.lineWidth = 1;
    var grid = 60;
    var ox = (game.player.x * 0.05) % grid;
    var oy = (game.player.y * 0.05) % grid;
    ctx.beginPath();
    for (var x = -ox; x < W; x += grid) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (var y = -oy; y < H; y += grid) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();

    ctx.save();
    if (game.shake > 0) {
      ctx.translate((Math.random() - 0.5) * game.shake, (Math.random() - 0.5) * game.shake);
    }

    // Pickup radius (faint)
    ctx.strokeStyle = 'rgba(100,200,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(game.player.x, game.player.y, game.player.pickupRadius, 0, Math.PI * 2); ctx.stroke();

    // XP orbs
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#6ff';
    for (var o = 0; o < game.orbs.length; o++) {
      var or = game.orbs[o];
      ctx.fillStyle = '#6ff';
      ctx.beginPath(); ctx.arc(or.x, or.y, or.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Pickups
    for (var pk = 0; pk < game.pickups.length; pk++) {
      var pkp = game.pickups[pk];
      var pulse = 0.8 + Math.sin(game.t * 6) * 0.2;
      ctx.save();
      ctx.translate(pkp.x, pkp.y);
      ctx.scale(pulse, pulse);
      if (pkp.kind === 'heart') {
        ctx.shadowBlur = 15; ctx.shadowColor = '#ff5577';
        ctx.fillStyle = '#ff5577';
        ctx.beginPath();
        ctx.moveTo(0, 4);
        ctx.bezierCurveTo(8, -6, 12, 4, 0, 10);
        ctx.bezierCurveTo(-12, 4, -8, -6, 0, 4);
        ctx.fill();
      } else if (pkp.kind === 'bomb') {
        ctx.shadowBlur = 20; ctx.shadowColor = '#ffeb3b';
        ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#ffeb3b';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('!', 0, 0);
      }
      ctx.restore();
    }
    ctx.shadowBlur = 0;

    // Enemies
    for (var e = 0; e < game.enemies.length; e++) {
      drawEnemy(game.enemies[e]);
    }

    // Bullets
    for (var b = 0; b < game.bullets.length; b++) {
      drawBullet(game.bullets[b]);
    }

    // Player
    drawPlayer(game.player);

    // Particles
    ctx.shadowBlur = 8;
    for (var pt = 0; pt < game.particles.length; pt++) {
      var par = game.particles[pt];
      var a = clamp(par.life / par.max, 0, 1);
      ctx.globalAlpha = a;
      ctx.shadowColor = par.color;
      ctx.fillStyle = par.color;
      ctx.beginPath(); ctx.arc(par.x, par.y, par.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Damage numbers
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    for (var dn = 0; dn < game.damageNumbers.length; dn++) {
      var dnm = game.damageNumbers[dn];
      var alpha = 1 - dnm.t / 0.6;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 6; ctx.shadowColor = '#000';
      ctx.fillText(dnm.dmg, dnm.x, dnm.y);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    ctx.restore();

    // Flash overlay
    if (game.flash > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + (game.flash * 0.6) + ')';
      ctx.fillRect(0, 0, W, H);
    }

    // Boss HP bar
    var boss = null;
    for (var z = 0; z < game.enemies.length; z++) { if (game.enemies[z].kind === 'boss') { boss = game.enemies[z]; break; } }
    if (boss) {
      var bbw = W * 0.6, bbx = (W - bbw) / 2, bby = H - 40;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(bbx - 2, bby - 2, bbw + 4, 14);
      ctx.fillStyle = 'rgba(255,48,96,0.25)';
      ctx.fillRect(bbx, bby, bbw, 10);
      ctx.fillStyle = '#ff3060';
      ctx.shadowBlur = 12; ctx.shadowColor = '#ff3060';
      ctx.fillRect(bbx, bby, bbw * (boss.hp / boss.maxHp), 10);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
      ctx.fillText('◆ BOSS ◆', W / 2, bby - 6);
    }
  }

  function drawPlayer(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    // aim angle toward nearest enemy for facing
    var t = findNearestEnemy(game, p.x, p.y, 9999);
    var a = t ? angle(p.x, p.y, t.x, t.y) : 0;
    ctx.rotate(a);

    // shield ring if invulnerable
    if (p.inv > 0) {
      ctx.strokeStyle = 'rgba(100,255,255,' + (0.4 + Math.sin(game.t * 40) * 0.3) + ')';
      ctx.lineWidth = 2;
      ctx.shadowBlur = 12; ctx.shadowColor = '#6ff';
      ctx.beginPath(); ctx.arc(0, 0, p.r + 6, 0, Math.PI * 2); ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // ship body - triangle
    ctx.fillStyle = '#0c1526';
    ctx.strokeStyle = '#6ff';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 14; ctx.shadowColor = '#6ff';
    ctx.beginPath();
    ctx.moveTo(p.r + 2, 0);
    ctx.lineTo(-p.r, -p.r * 0.8);
    ctx.lineTo(-p.r * 0.5, 0);
    ctx.lineTo(-p.r, p.r * 0.8);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // core
    ctx.fillStyle = '#ba88ff';
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.a);

    var color = e.hitFlash > 0 ? '#fff' : e.color;
    ctx.strokeStyle = color;
    ctx.fillStyle = 'rgba(10,14,24,0.85)';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10;
    ctx.shadowColor = color;

    if (e.shape === 'tri') {
      ctx.beginPath();
      for (var i = 0; i < 3; i++) {
        var a = (i / 3) * Math.PI * 2;
        var x = Math.cos(a) * e.r, y = Math.sin(a) * e.r;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if (e.shape === 'diamond') {
      ctx.beginPath();
      ctx.moveTo(e.r, 0); ctx.lineTo(0, e.r * 0.7); ctx.lineTo(-e.r, 0); ctx.lineTo(0, -e.r * 0.7);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if (e.shape === 'hex') {
      ctx.beginPath();
      for (var j = 0; j < 6; j++) {
        var ha = (j / 6) * Math.PI * 2;
        var hx = Math.cos(ha) * e.r, hy = Math.sin(ha) * e.r;
        if (j === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if (e.shape === 'dot') {
      ctx.beginPath(); ctx.arc(0, 0, e.r, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
    } else if (e.shape === 'boss') {
      // Boss: large layered star
      ctx.lineWidth = 3;
      for (var layer = 0; layer < 3; layer++) {
        var rr = e.r - layer * 6;
        ctx.beginPath();
        for (var s = 0; s < 8; s++) {
          var sa = (s / 8) * Math.PI * 2;
          var sr = s % 2 === 0 ? rr : rr * 0.65;
          var sx = Math.cos(sa) * sr, sy = Math.sin(sa) * sr;
          if (s === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        }
        ctx.closePath();
        ctx.globalAlpha = 1 - layer * 0.25;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.restore();

    // HP bar for tank/boss
    if (e.kind === 'tank' && e.hp < e.maxHp) {
      ctx.fillStyle = 'rgba(255,80,110,0.2)';
      ctx.fillRect(e.x - e.r, e.y - e.r - 7, e.r * 2, 3);
      ctx.fillStyle = '#ff5070';
      ctx.fillRect(e.x - e.r, e.y - e.r - 7, (e.r * 2) * (e.hp / e.maxHp), 3);
    }
  }

  function drawBullet(bu) {
    if (bu.wave) {
      ctx.strokeStyle = bu.color;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 20; ctx.shadowColor = bu.color;
      ctx.globalAlpha = 0.8;
      ctx.beginPath(); ctx.arc(bu.x, bu.y, bu.r, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 0.3;
      ctx.lineWidth = 8;
      ctx.beginPath(); ctx.arc(bu.x, bu.y, bu.r, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      return;
    }
    if (bu.beam) {
      ctx.strokeStyle = bu.color;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 14; ctx.shadowColor = bu.color;
      ctx.globalAlpha = Math.max(0, bu.life / 0.2);
      ctx.beginPath();
      // jaggy lightning
      var segs = 8;
      var dx = (bu.x2 - bu.x1) / segs, dy = (bu.y2 - bu.y1) / segs;
      ctx.moveTo(bu.x1, bu.y1);
      for (var s = 1; s < segs; s++) {
        var jx = bu.x1 + dx * s + rand(-6, 6);
        var jy = bu.y1 + dy * s + rand(-6, 6);
        ctx.lineTo(jx, jy);
      }
      ctx.lineTo(bu.x2, bu.y2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      return;
    }
    // Trail
    if (bu.trail && bu.trail.length > 1) {
      ctx.strokeStyle = bu.color;
      ctx.lineWidth = bu.r * 1.2;
      ctx.lineCap = 'round';
      ctx.globalAlpha = 0.35;
      ctx.shadowBlur = 10; ctx.shadowColor = bu.color;
      ctx.beginPath();
      for (var t = 0; t < bu.trail.length; t++) {
        var pt = bu.trail[t];
        if (t === 0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = bu.color;
    ctx.shadowBlur = 12; ctx.shadowColor = bu.color;
    ctx.beginPath(); ctx.arc(bu.x, bu.y, bu.r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ---------- HUD ----------
  var toastTimer = 0;
  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { t.classList.remove('show'); }, 1200);
  }

  function fmtTime(s) {
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function updateHud() {
    document.getElementById('timer').textContent = fmtTime(game.t);
    document.getElementById('kills').textContent = game.kills;
    document.getElementById('best').textContent = fmtTime(bestTime);

    var p = game.player;
    document.getElementById('hpfill').style.width = Math.max(0, p.hp / p.maxHp * 100) + '%';
    document.getElementById('hplabel').textContent = 'HULL ' + Math.max(0, Math.ceil(p.hp)) + ' / ' + p.maxHp;
    document.getElementById('lvlchip').textContent = 'LV ' + p.level;
    document.getElementById('xpfill').style.width = (p.xp / p.xpNext * 100) + '%';

    var wrap = document.getElementById('weapons');
    if (wrap.childElementCount !== game.weapons.length) {
      wrap.innerHTML = '';
      game.weapons.forEach(function (w) {
        var d = document.createElement('div');
        d.className = 'wslot';
        d.dataset.key = w.key;
        wrap.appendChild(d);
      });
    }
    for (var i = 0; i < game.weapons.length; i++) {
      var w = game.weapons[i];
      var el = wrap.children[i];
      el.style.color = w.def.color;
      el.style.borderColor = w.def.color + '55';
      el.innerHTML = '<b>' + w.def.icon + ' ' + w.def.name + '</b>LV ' + w.level;
    }
  }

  // ---------- Game over ----------
  var bestTime = 0;
  try { bestTime = parseFloat(localStorage.getItem('neonsurge.best') || '0') || 0; } catch (e) {}

  function gameOver() {
    game.running = false;
    sfxDead();
    game.shake = 30;
    if (game.t > bestTime) {
      bestTime = game.t;
      try { localStorage.setItem('neonsurge.best', String(bestTime)); } catch (e) {}
    }
    setTimeout(function () {
      document.getElementById('goStats').textContent = 'TIME ' + fmtTime(game.t) + ' · KILLS ' + game.kills + ' · LV ' + game.player.level;
      var verdict;
      if (game.t < 30) verdict = 'A warm-up. You can do better.';
      else if (game.t < 90) verdict = 'The surge claimed you. Try tighter routing.';
      else if (game.t < 180) verdict = 'Solid run. Now shape the build.';
      else if (game.t < 300) verdict = 'Dangerous. The void noticed.';
      else verdict = 'Legendary. You bent the horde.';
      document.getElementById('goVerdict').textContent = verdict;
      document.getElementById('gameover').classList.remove('hidden');
    }, 900);
  }

  // ---------- Loop ----------
  var lastT = 0;
  function frame(ts) {
    var now = ts / 1000;
    var dt = Math.min(0.05, now - lastT || 0);
    lastT = now;

    update(dt);
    render();

    requestAnimationFrame(frame);
  }

  // ---------- Controls ----------
  document.getElementById('startBtn').onclick = function () {
    initAudio();
    if (AC && AC.state === 'suspended') AC.resume();
    document.getElementById('overlay').classList.add('hidden');
    newGame();
    game.running = true;
    updateHud();
  };
  document.getElementById('retryBtn').onclick = function () {
    document.getElementById('gameover').classList.add('hidden');
    newGame();
    game.running = true;
    updateHud();
  };
  window.addEventListener('keydown', function (e) {
    if ((e.key === 'Enter' || e.key === ' ') && !document.getElementById('overlay').classList.contains('hidden')) {
      document.getElementById('startBtn').click();
    }
    if ((e.key === 'Enter' || e.key === ' ') && !document.getElementById('gameover').classList.contains('hidden')) {
      document.getElementById('retryBtn').click();
    }
  });

  newGame();
  updateHud();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
